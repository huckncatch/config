"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_status\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

[directory]
style = "bold cyan"
truncation_length = 4
truncate_to_repo = true

[git_branch]
format = "on [$branch(:$remote_branch)]($style) "
style = "bold green"
symbol = ""

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "bold blue"
ahead = "↑${count}"
behind = "↓${count}"
diverged = "↑${ahead_count}↓${behind_count}"
modified = "✹ "
untracked = "✭ "
staged = "✚ "
deleted = "✖ "
stashed = ""

[fill]
symbol = " "

[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "
style = "yellow"

[time]
disabled = false
format = "[$time]($style)"
style = "yellow"
time_format = "%H:%M:%S"

[character]
success_symbol = "[❯](bold blue)"
error_symbol = "[❯](bold red)"

[username]
show_always = false

[hostname]
ssh_only = true
